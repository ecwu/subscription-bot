name = "subscription-bot"
main = "src/index.ts"
compatibility_date = "2026-05-18"
compatibility_flags = ["nodejs_compat"]

rules = [
  { type = "Data", globs = ["**/*.woff2"], fallthrough = true },
]

[vars]
APP_ENV = "development"
REMINDER_DAYS_AHEAD = "3"

# To use a real KV namespace, create one and fill in the IDs:
#   wrangler kv:namespace create SUBSCRIPTION_KV
#   wrangler kv:namespace create SUBSCRIPTION_KV --preview
# Then uncomment and replace the id/preview_id below.
[[kv_namespaces]]
binding = "SUBSCRIPTION_KV"
id = "00d51942c6564b588079bf62b25e47cb"
preview_id = "6401a8087afa4916be481c9d71a8266c"

[triggers]
crons = ["0 8 * * *"]

# Secrets (set via `wrangler secret put`):
# BOT_TOKEN
# TELEGRAM_WEBHOOK_SECRET
# ENCRYPTION_KEY
# USER_HASH_SECRET
# ADMIN_USER_ID
